name: Build Swift Bridge

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift static library
        run: swift build -c release --build-path lib

      - name: Verify artifact exists
        run: test -f lib/release/libFluidAudioBridge.a

      - uses: actions/upload-artifact@v4
        with:
          name: libFluidAudioBridge
          path: lib/release/libFluidAudioBridge.a
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: lib/release/libFluidAudioBridge.a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
